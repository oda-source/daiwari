<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: sans-serif;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    input[type="text"], input[type="date"], input[type="number"] {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .file-area {
      margin-top: 15px;
      padding: 15px;
      border: 2px dashed #007bff;
      background: #f8f9fa;
      text-align: center;
      cursor: pointer;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover {
      background-color: #218838;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>共通情報入力</h3>
  
  <div class="form-group">
    <label>媒体コード ※必須</label>
    <input type="text" id="mediaCode" placeholder="例: 12">
  </div>
  
  <div class="form-group">
    <label>発送日</label>
    <input type="date" id="shipDate">
  </div>
  
  <div class="form-group">
    <label>部数</label>
    <input type="number" id="volume" placeholder="例: 10" min="1">
  </div>

  <div class="file-area" id="dropZone">
    <span style="font-size: 13px; color: #555;">クリックしてPDFファイルを選択<br>(複数選択可)</span>
    <input type="file" id="fileInput" multiple accept=".pdf" style="display: none;">
  </div>
  
  <div id="status">ファイル未選択</div>

  <button id="startBtn">自動登録を開始する</button>

  <script src="popup.js"></script>
</body>
</html>
